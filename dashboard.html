<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You Got Aespa!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            min-height: -webkit-fill-available;
            overflow: hidden;
            position: relative;
        }

        #bg-confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        .content-container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 95%;
            height: 100vh;
            max-height: 100vh;
            padding: 10px;
            box-sizing: border-box;
        }

        .video-stage {
            display: flex;
            flex-direction: column; 
            align-items: center;    
            gap: 10px;              
            width: 100%;
            margin-bottom: 12px;
        }

        .scuba-top-gif {
            width: 120px;           
            height: auto;           
            object-fit: contain;
        }

        video {
            width: 100%;
            max-width: 640px;
            height: auto;
            max-height: 45vh;
            object-fit: contain;
            border-radius: 12px;
            border: 2px solid #39ff14;
            box-shadow: 
                0 0 20px rgba(57, 255, 20, 0.6),
                0 0 50px rgba(57, 255, 20, 0.4),
                inset 0 0 15px rgba(57, 255, 20, 0.2);
        }

        .message-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            gap: 8px;
        }

        .lang-en {
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            background: linear-gradient(45deg, #39ff14, #00ffaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.2);
            word-wrap: break-word;
            display: block;
        }

        .emoji-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .custom-png-emoji {
            height: 50px;
            width: auto;   
            object-fit: contain;
        }

        .btn-primary-lg {
            margin-top: 15px;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            color: #000000;
            background: #39ff14;
            border: 2px solid #39ff14;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.4);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 100%;
        }
        
        .btn-primary-lg:hover {
            background: transparent;
            color: #39ff14;
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.8);
            transform: translateY(-1px);
        }

        @media (max-width: 768px) or (max-height: 600px) {
            body {
                height: -webkit-fill-available;
            }
            .content-container {
                height: 100%;
                justify-content: center;
                padding-top: 0;
            }
            .video-stage {
                gap: 5px;
                margin-bottom: 8px;
            }
            .scuba-top-gif {
                width: 90px; 
            }
            video {
                max-width: 280px;
                max-height: 35vh;
            }
            .lang-en { 
                font-size: 1.4rem; 
            }
            .custom-png-emoji {
                height: 38px;
            }
            .btn-primary-lg { 
                margin-top: 12px;
                padding: 10px 24px;
                font-size: 0.9rem;
                width: 80%;
            }
        }
    </style>
</head>
<body>

    <canvas id="bg-confetti-canvas"></canvas>

    <div class="content-container">
        
        <div class="video-stage">
            <img class="scuba-top-gif" src="scuba.gif" alt="Scuba Top">
            <video autoplay loop playsinline>
                <source src="aespa.mp4" type="video/mp4">
            </video>
        </div>

        <div class="message-box">
            <div class="lang-en">You just got aespa!</div>
            <div class="emoji-wrapper">
                <img class="custom-png-emoji" src="lmao.png" alt="emoji">
            </div>
        </div>

        <button class="btn-primary-lg" onclick="window.location.href='index.html'">Okay bro whatever</button>
    </div>

    <script>
        window.addEventListener('load', () => {
            const canvasElement = document.getElementById('bg-confetti-canvas');
            const backgroundConfetti = confetti.create(canvasElement, {
                resize: true,
                useWorker: true
            });

            const isMobile = window.innerWidth <= 768 || window.innerHeight <= 600;

            backgroundConfetti({
                particleCount: isMobile ? 180 : 450,
                spread: isMobile ? 160 : 500,                          
                startVelocity: isMobile ? 25 : 45,                    
                origin: { x: 0.5, y: isMobile ? 0.25 : 0.1 },           
                colors: ['#39ff14', '#00ffaa', '#12b000', '#004400', '#ffffff'] 
            });
        });
    </script>

</body>
</html>
