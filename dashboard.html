<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You Got Aespa!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --vh: 1vh;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: calc(var(--vh) * 100);
            overflow: hidden;
            position: relative;
        }

        #loading-curtain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: calc(var(--vh) * 100);
            background-color: #000000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .enter-btn {
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            color: #000000;
            background: #39ff14;
            border: 2px solid #39ff14;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.5);
            transition: all 0.2s ease;
            animation: pulse 1.5s infinite;
            display: none;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(57, 255, 20, 0.5); }
            50% { transform: scale(1.05); box-shadow: 0 0 35px rgba(57, 255, 20, 0.8); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(57, 255, 20, 0.5); }
        }

        #bg-confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: calc(var(--vh) * 100);
            z-index: 1;
            pointer-events: none;
        }

        .content-container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 95%;
            height: calc(var(--vh) * 100);
            padding: 10px;
            box-sizing: border-box;
        }

        .video-stage {
            display: flex;
            flex-direction: column; 
            align-items: center;    
            gap: 10px;              
            width: 100%;
            margin-bottom: 12px;
        }

        .scuba-top-gif {
            width: 120px;           
            height: auto;           
            object-fit: contain;
        }

        /* Container that forces a gap-free layout across screen form factors */
        .video-container {
            width: 90vw;
            max-width: 640px;
            aspect-ratio: 16 / 9; /* Matches the video's green screen dimensions */
            border-radius: 12px;
            border: 2px solid #39ff14;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.6);
            overflow: hidden;
            background-color: #000000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Forces the video to edge-fill its wrapper without gaps */
            display: block;
        }

        .message-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            gap: 8px;
        }

        .lang-en {
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            background: linear-gradient(45deg, #39ff14, #00ffaa);
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .emoji-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .custom-png-emoji {
            height: 50px;
            width: auto;   
            object-fit: contain;
        }

        .btn-primary-lg {
            margin-top: 15px;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            color: #000000;
            background: #39ff14;
            border: 2px solid #39ff14;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.4);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .btn-primary-lg:hover {
            background: transparent;
            color: #39ff14;
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.8);
            transform: translateY(-1px);
        }

        @media (max-width: 768px) {
            .scuba-top-gif { width: 90px; }
            .video-container { max-width: 320px; }
            .lang-en { font-size: 1.4rem; }
            .custom-png-emoji { height: 38px; }
            .btn-primary-lg { margin-top: 12px; padding: 10px 24px; font-size: 0.9rem; width: 80%; }
        }
    </style>
</head>
<body>

    <div id="loading-curtain">
        <button id="start-btn" class="enter-btn">Tap to Reveal</button>
    </div>

    <canvas id="bg-confetti-canvas"></canvas>

    <div class="content-container">
        <div class="video-stage">
            <img class="scuba-top-gif" src="scuba.gif" alt="Scuba Top">
            <div class="video-container">
                <video id="target-video" loop playsinline>
                    <source src="aespa.mp4" type="video/mp4">
                </video>
            </div>
        </div>

        <div class="message-box">
            <div class="lang-en">You just got aespa!</div>
            <div class="emoji-wrapper">
                <img class="custom-png-emoji" src="lmao.png" alt="emoji">
            </div>
        </div>

        <button class="btn-primary-lg" onclick="window.location.href='index.html'">Okay bro whatever</button>
    </div>

    <script>
        function calculateScreenSize() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }

        calculateScreenSize();
        window.addEventListener('resize', calculateScreenSize);

        window.addEventListener('load', () => {
            const canvasElement = document.getElementById('bg-confetti-canvas');
            const videoElement = document.getElementById('target-video');
            const curtainElement = document.getElementById('loading-curtain');
            const startBtn = document.getElementById('start-btn');
            
            const backgroundConfetti = confetti.create(canvasElement, {
                resize: true,
                useWorker: true
            });

            const currentWidth = window.innerWidth;
            const isSmallPhone = currentWidth <= 480;

            function fireConfetti() {
                backgroundConfetti({
                    particleCount: isSmallPhone ? 120 : 350,
                    spread: isSmallPhone ? 80 : 360,                                          
                    startVelocity: isSmallPhone ? 22 : 40,
                    origin: { x: 0.5, y: isSmallPhone ? 0.35 : 0.15 },           
                    colors: ['#39ff14', '#00ffaa', '#12b000', '#004400', '#ffffff'] 
                });
            }

            function dismissCurtain() {
                curtainElement.style.opacity = '0';
                setTimeout(() => {
                    curtainElement.style.display = 'none';
                }, 500);
            }

            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;
            const isSafari = /^((?!chrome|android).)*safari/i.test(userAgent);

            if (isIOS || isSafari) {
                startBtn.style.display = 'block';
                videoElement.muted = true;
                videoElement.play().catch(err => console.log("Waiting for gesture..."));

                startBtn.addEventListener('click', () => {
                    videoElement.muted = false;
                    videoElement.currentTime = 0;
                    videoElement.play();
                    dismissCurtain();
                    fireConfetti();
                });
            } else {
                videoElement.muted = false;
                videoElement.play()
                    .then(() => {
                        dismissCurtain();
                        fireConfetti();
                    })
                    .catch(error => {
                        console.log("Autoplay blocked, falling back to muted auto-play");
                        videoElement.muted = true;
                        videoElement.play();
                        dismissCurtain();
                        fireConfetti();
                    });
            }
        });
    </script>
</body>
</html>
